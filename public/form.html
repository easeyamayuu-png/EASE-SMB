<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 EASE-SMB 入庫予約フォーム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #e9ecef; font-family: 'Helvetica Neue', Arial, sans-serif; }
        .form-card { max-width: 600px; margin: 50px auto; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header-banner { background-color: #0d6efd; color: white; padding: 20px; border-top-left-radius: 0.375rem; border-top-right-radius: 0.375rem; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card form-card">
            <div class="header-banner">
                <h3 class="mb-0">🚗 EASE-SMB 入庫予約フォーム</h3>
                <p class="mb-0 mt-2 text-white-50">必要事項をご入力の上、ご予約ください</p>
            </div>
            <div class="card-body p-4">
                <form id="reservation-form">
                    <div class="mb-3">
                        <label for="customerName" class="form-label fw-bold">お名前</label>
                        <input type="text" class="form-control" id="customerName" placeholder="山田 太郎" required>
                    </div>

                    <div class="mb-3">
                        <label for="carModel" class="form-label fw-bold">車種</label>
                        <input type="text" class="form-control" id="carModel" placeholder="プリウス" required>
                    </div>

                    <div class="mb-3">
                        <label for="carNumber" class="form-label fw-bold">車両番号</label>
                        <input type="text" class="form-control" id="carNumber" placeholder="品川 500 わ 12-34" required>
                    </div>

                    <div class="mb-3">
                        <label for="menu" class="form-label fw-bold">ご希望メニュー</label>
                        <select class="form-select" id="menu" required>
                            <option value="" disabled selected>選択してください</option>
                            <option value="オイル交換">オイル交換</option>
                            <option value="12ヶ月点検">12ヶ月点検</option>
                            <option value="車検見積り">車検見積り</option>
                            <option value="その他整備">その他整備</option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label for="datetime" class="form-label fw-bold">ご希望日時（15分刻み）</label>
                        <input type="datetime-local" class="form-control" id="datetime" step="900" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2">この内容で入庫予約を申し込む</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('reservation-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const rawDatetime = document.getElementById('datetime').value; // 例: "2026-06-07T14:15"
            // 秒数（:00）が含まれてしまう場合があるので、綺麗に「YYYY-MM-DD HH:mm」の形式に整える
            const dateObj = new Date(rawDatetime);
            const yyyy = dateObj.getFullYear();
            const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
            const dd = String(dateObj.getDate()).padStart(2, '0');
            const hh = String(dateObj.getHours()).padStart(2, '0');
            const min = String(dateObj.getMinutes()).padStart(2, '0');
            const formattedDatetime = `${yyyy}-${mm}-${dd} ${hh}:${min}`; // "2026-06-07 14:15"

            const formData = {
                customerName: document.getElementById('customerName').value,
                carModel: document.getElementById('carModel').value,
                carNumber: document.getElementById('carNumber').value,
                menu: document.getElementById('menu').value,
                datetime: formattedDatetime
            };

            try {
                const response = await fetch('/api/reservations', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('🎉 予約の申し込みが完了しました！店舗からのLINE通知をお待ちください。');
                    document.getElementById('reservation-form').reset();
                } else {
                    alert('❌ エラーが発生しました。');
                }
            } catch (error) {
                console.error('送信エラー:', error);
            }
        });
    </script>
</body>
</html>
