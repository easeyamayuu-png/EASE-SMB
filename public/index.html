<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>EASE-SMB 入庫管理ボード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; font-size: 0.8rem; }
        .day-timeline-container { background: white; border-radius: 8px; border: 1px solid #dee2e6; margin-bottom: 20px; }
        .day-row { display: flex; border-bottom: 1px solid #dee2e6; min-height: 50px; }
        .day-label { width: 120px; background: #f8f9fa; border-right: 2px solid #dee2e6; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .timeline-board { display: flex; flex: 1; overflow-x: auto; padding: 5px; }
        .reservation-card { background: #fff3cd; border-left: 4px solid #ffc107; padding: 4px; margin: 2px; font-size: 0.7rem; border-radius: 4px; min-width: 80px; }
        .card-approved { background: #d1e7dd !important; border-left-color: #198754 !important; }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <h4 class="fw-bold mb-3">🚗 EASE-SMB 入庫管理ボード</h4>
        <div id="timeline-3days-container" class="day-timeline-container"></div>
        <h6 class="fw-bold">📋 予約データ一覧</h6>
        <div class="card p-3">
            <table class="table table-sm table-hover align-middle">
                <thead class="table-light"><tr><th>お客様名</th><th>車種</th><th>車両番号</th><th>メニュー</th><th>入庫日時</th><th>状況</th><th>お断り理由</th><th>アクション</th></tr></thead>
                <tbody id="reservation-list"></tbody>
            </table>
        </div>
    </div>

    <script>
        async function loadReservations() {
            const res = await fetch('/api/reservations');
            const data = await res.json();
            const tbody = document.getElementById('reservation-list');
            const container = document.getElementById('timeline-3days-container');
            
            tbody.innerHTML = '';
            // タイムライン描画（日付ごとにグループ化）
            const dates = [...new Set(data.map(r => r.datetime.split(' ')[0]))].sort();
            container.innerHTML = dates.map(date => `
                <div class="day-row">
                    <div class="day-label">${date}</div>
                    <div class="timeline-board" id="row-${date}"></div>
                </div>
            `).join('');

            data.forEach(r => {
                tbody.innerHTML += `<tr>
                    <td>${r.customerName}</td><td>${r.carModel}</td><td>${r.carNumber}</td><td>${r.menu}</td><td>${r.datetime}</td>
                    <td>${r.status === 'approved' ? '承認済' : '確認中'}</td>
                    <td><input type="text" id="reason-${r.id}" value="${r.rejectReason || ''}" class="form-control form-control-sm"></td>
                    <td>
                        ${r.status !== 'approved' ? `<button class="btn btn-sm btn-success" onclick="updateStatus('${r.id}', 'approve')">承認</button>` : ''}
                        <button class="btn btn-sm btn-danger" onclick="updateStatus('${r.id}', 'reject')">却下</button>
                    </td>
                </tr>`;
                
                const row = document.getElementById(`row-${r.datetime.split(' ')[0]}`);
                if(row) row.innerHTML += `<div class="reservation-card ${r.status==='approved'?'card-approved':''}">${r.customerName}<br>${r.menu}</div>`;
            });
        }

        async function updateStatus(id, action) {
            const reason = document.getElementById(`reason-${id}`).value;
            // 状態更新
            await fetch(`/api/reservations/${id}/${action}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ rejectReason: reason })
            });
            // LINE通知
            await fetch(`/api/notify-line`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id, message: action === 'approve' ? '予約が承認されました' : '予約が却下されました: ' + reason })
            });
            loadReservations();
        }
        loadReservations();
    </script>
</body>
</html>
