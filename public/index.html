<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASE-SMB 入庫管理・3連15分タイムライン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 0.85rem; }
        .navbar-brand { font-weight: bold; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-radius: 10px; }
        .table th { background-color: #f8f9fa; }
        .day-timeline-container { background: white; border-radius: 8px; border: 1px solid #dee2e6; overflow: hidden; }
        .day-row { display: flex; align-items: stretch; border-bottom: 1px solid #dee2e6; }
        .day-label { width: 110px; background-color: #f8f9fa; border-right: 2px solid #dee2e6; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; padding: 5px; }
        .timeline-board-horizontal { display: flex; flex: 1; width: 100%; }
        .timeline-column { flex: 1; min-width: 0; border-right: 1px solid #eee; display: flex; flex-direction: column; }
        .timeline-hour-header { background-color: #e9ecef; font-weight: bold; text-align: center; padding: 2px 0; font-size: 0.55rem; border-bottom: 1px solid #dee2e6; }
        .timeline-slots-horizontal { padding: 3px 1px; flex: 1; display: flex; flex-direction: column; gap: 2px; min-height: 45px; background-color: #fff; cursor: pointer; }
        .timeline-slots-horizontal:hover { background-color: #e7f1ff; }
        .reservation-card { background: #fff3cd; border-left: 2px solid #ffc107; padding: 1px 2px; border-radius: 2px; font-size: 0.55rem; }
        .card-approved { background: #d1e7dd !important; border-left-color: #198754 !important; color: #0f5132; }
        .empty-text { font-size: 0.5rem; color: #f0f0f0; text-align: center; margin: auto 0; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark"><div class="container-fluid px-4"><span class="navbar-brand">🚗 EASE-SMB 入庫管理ボード</span></div></nav>

    <div class="container-fluid px-4 my-3">
        <div class="d-flex align-items-center justify-content-between mb-2">
            <h6 class="fw-bold text-secondary">📅 3日間スケジュール</h6>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-dark btn-sm" onclick="moveDate(-1)">◀ 前日</button>
                <input type="date" id="base-date" class="form-control form-control-sm" style="width: 140px;">
                <button class="btn btn-outline-dark btn-sm" onclick="moveDate(1)">翌日 ▶</button>
            </div>
        </div>
        <div class="card p-2 mb-4"><div class="day-timeline-container" id="timeline-3days-container"></div></div>
        <h6 class="mb-2 fw-bold text-secondary">📋 予約データ一覧</h6>
        <div class="card p-3"><table class="table table-sm table-hover align-middle"><thead class="table-light"><tr><th>お客様名</th><th>車種</th><th>メニュー</th><th>入庫日時</th><th>ステータス</th><th>アクション</th></tr></thead><tbody id="reservation-list"></tbody></table></div>
    </div>

    <div class="modal fade" id="addReservationModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-header"><h5>電話予約の追加</h5></div><div class="modal-body"><input type="text" id="new-name" class="form-control mb-2" placeholder="お客様名"><input type="text" id="new-car" class="form-control mb-2" placeholder="車種"><input type="text" id="new-menu" class="form-control mb-2" placeholder="メニュー"><input type="hidden" id="target-datetime"></div><div class="modal-footer"><button class="btn btn-primary" onclick="saveManualReservation()">ボードに反映</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const operatingHours = [];
        for (let h = 9; h <= 18; h++) {
            ['00', '15', '30', '45'].forEach(m => operatingHours.push(`${String(h).padStart(2,'0')}:${m}`));
        }

        function formatDateString(d) { return d.toISOString().split('T')[0]; }
        
        document.getElementById('base-date').value = formatDateString(new Date());
        document.getElementById('base-date').addEventListener('change', loadReservations);

        function moveDate(days) {
            const d = new Date(document.getElementById('base-date').value);
            d.setDate(d.getDate() + days);
            document.getElementById('base-date').value = formatDateString(d);
            loadReservations();
        }

        function initTimeline3Days(dateStrings) {
            const container = document.getElementById('timeline-3days-container');
            container.innerHTML = '';
            dateStrings.forEach((dateStr, i) => {
                let row = `<div class="day-row"><div class="day-label">${dateStr.substring(5)}</div><div class="timeline-board-horizontal">`;
                operatingHours.forEach(hour => {
                    row += `<div class="timeline-column"><div class="timeline-slots-horizontal" id="slot-${dateStr}-${hour.replace(':','-')}" onclick="openModal('${dateStr}','${hour}')"><span class="empty-text">-</span></div></div>`;
                });
                container.innerHTML += row + `</div></div>`;
            });
        }

        function openModal(d, h) { document.getElementById('target-datetime').value = `${d} ${h}`; new bootstrap.Modal(document.getElementById('addReservationModal')).show(); }

        async function saveManualReservation() {
            await fetch('/api/reservations', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({
                customerName: document.getElementById('new-name').value,
                carModel: document.getElementById('new-car').value,
                menu: document.getElementById('new-menu').value,
                datetime: document.getElementById('target-datetime').value,
                status: 'approved'
            })});
            location.reload();
        }

        async function loadReservations() {
            const d = new Date(document.getElementById('base-date').value);
            const dates = [formatDateString(d), formatDateString(new Date(d.getTime()+86400000)), formatDateString(new Date(d.getTime()+172800000))];
            initTimeline3Days(dates);
            const res = await fetch('/api/reservations');
            const data = await res.json();
            const tbody = document.getElementById('reservation-list');
            tbody.innerHTML = '';
            data.forEach(r => {
                tbody.innerHTML += `<tr><td>${r.customerName}</td><td>${r.carModel}</td><td>${r.menu}</td><td>${r.datetime}</td><td>${r.status}</td><td>${r.status==='pending'?`<button class="btn btn-sm btn-success" onclick="approve('${r.id}')">OK</button>`:''}</td></tr>`;
                const slot = document.getElementById(`slot-${r.datetime.replace(':','-').replace(' ', '-')}`);
                if(slot) { slot.querySelector('.empty-text').remove(); slot.innerHTML += `<div class="reservation-card ${r.status==='approved'?'card-approved':''}">${r.customerName.substring(0,3)}</div>`; }
            });
        }
        async function approve(id) { await fetch(`/api/reservations/${id}/approve`, {method:'PATCH'}); loadReservations(); }
        loadReservations();
    </script>
</body>
</html>
