<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>EASE-SMB 入庫管理タスクボード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f4f6f9; font-size: 0.85rem; color: #333; font-family: 'Helvetica Neue', Arial, sans-serif; }
        
        .task-card { background: white; border: none; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: transform 0.2s, box-shadow 0.2s; border-left: 5px solid #fd7e14; animation: pulse-border 2s infinite; }
        .task-card:hover { transform: translateY(-3px); box-shadow: 0 8px 15px rgba(0,0,0,0.1); }
        @keyframes pulse-border { 0% { border-left-color: #fd7e14; } 50% { border-left-color: #ffc107; } 100% { border-left-color: #fd7e14; } }
        
        .timeline-container { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .timeline-header-row { display: flex; background: #343a40; color: white; border-radius: 6px 6px 0 0; font-weight: bold; align-items: center; }
        .timeline-row { display: flex; border-bottom: 1px solid #e9ecef; height: 55px; align-items: center; position: relative; }
        .day-label { width: 110px; font-weight: 700; background: #e9ecef; text-align: center; height: 100%; display: flex; align-items: center; justify-content: center; border-right: 2px solid #dee2e6; color: #495057; z-index: 20; }
        .slots-wrapper { display: flex; height: 100%; flex-grow: 1; position: relative; }
        .slot-cell { width: 45px; height: 100%; border-right: 1px solid #edf2f7; }
        
        .reservation-chip { 
            position: absolute; top: 6px; height: 42px; background: #e1f5fe; border: 1px solid #03a9f4; color: #0288d1; 
            font-size: 0.7rem; padding: 2px 8px; border-radius: 6px; overflow: hidden; text-overflow: ellipsis; 
            white-space: nowrap; font-weight: bold; z-index: 10; box-shadow: 0 2px 4px rgba(3,169,244,0.2); touch-action: none; user-select: none;
        }
        .reservation-chip:not(.chip-moving) { cursor: grab; }
        .chip-moving { cursor: grabbing; opacity: 0.8; z-index: 100 !important; box-shadow: 0 8px 16px rgba(0,0,0,0.15); }
        .chip-done { background: #e8f5e9 !important; border-color: #4caf50 !important; color: #2e7d32 !important; box-shadow: none !important; }
        
        .time-head { width: 180px; text-align: center; font-size: 0.75rem; background: #495057; border-right: 1px solid #6c757d; padding: 4px 0; }
        .date-nav-btn { background: #fff; border: 1px solid #ced4da; padding: 5px 15px; border-radius: 20px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .date-nav-btn:hover { background: #e9ecef; border-color: #adb5bd; }

        .admin-table-card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border: none; overflow: hidden; }
        .admin-table th { background: #212529; color: white; font-weight: bold; }
        .admin-table td { vertical-align: middle; }

        /* 💡 断り済み予約用のブラックアウト（ダークデザイン）スタイル */
        .row-rejected { background-color: #2b2d31 !important; color: #8a8d93 !important; transition: all 0.3s; }
        .row-rejected td { color: #8a8d93 !important; border-color: #3f4147 !important; }
        .row-rejected .badge { background-color: #4f5157 !important; color: #bbb !important; }
        .row-rejected input { background-color: #383a40 !important; border-color: #4f5157 !important; color: #8a8d93 !important; }
    </style>
</head>
<body>
<div class="container-fluid p-4">
    
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold m-0 text-dark"><i class="bi bi-speedometer2 text-primary me-2"></i>EASE-SMB 高機能入庫管理システム</h3>
        <span class="badge bg-dark px-3 py-2 fs-6" id="clock">2026-06-09</span>
    </div>

    <h5 class="fw-bold text-danger mb-3"><i class="bi bi-bell-fill text-warning me-2"></i>⚡ 要対応の新規案件（LINE未返信）</h5>
    <div id="pending-tasks-container" class="row row-cols-1 row-cols-md-3 g-3 mb-5"></div>

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h5 class="fw-bold text-secondary m-0"><i class="bi bi-calendar3 text-primary me-2"></i>📅 ピットスケジュール状況</h5>
        <div class="d-flex align-items-center gap-2">
            <button class="date-nav-btn" onclick="moveDate(-4)"><i class="bi bi-chevron-left"></i> 前の4日間</button>
            <button class="date-nav-btn" onclick="resetToToday()">今日に戻る</button>
            <button class="date-nav-btn" onclick="moveDate(4)">次の4日間 <i class="bi bi-chevron-right"></i></button>
        </div>
    </div>

    <div class="timeline-container mb-5">
        <div class="timeline-header-row mb-1">
            <div style="width: 110px;" class="text-center py-2">日付</div>
            <div class="d-flex flex-grow-1">
                <div class="time-head">9:00</div><div class="time-head">10:00</div><div class="time-head">11:00</div>
                <div class="time-head">12:00</div><div class="time-head">13:00</div><div class="time-head">14:00</div>
                <div class="time-head">15:00</div><div class="time-head">16:00</div><div class="time-head">17:00</div>
                <div class="time-head">18:00</div>
            </div>
        </div>
        <div id="timeline-rows-box"></div>
    </div>

    <h5 class="fw-bold text-secondary mb-3"><i class="bi bi-clipboard-data text-primary me-2"></i>📋 予約詳細・承認管理（断り済みは自動で下部に集約）</h5>
    <div class="card admin-table-card p-3 mb-4">
        <div class="table-responsive">
            <table class="table table-hover admin-table mb-0">
                <thead>
                    <tr>
                        <th>氏名</th>
                        <th>車種</th>
                        <th>番号</th>
                        <th>メニュー</th>
                        <th>日時</th>
                        <th>状況</th>
                        <th>断り理由</th>
                        <th style="width: 180px;">アクション</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body"></tbody>
            </table>
        </div>
    </div>
</div>

<div class="modal fade" id="detailModal" tabindex="-1" aria-labelledby="detailModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="border-radius: 16px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
            <div class="modal-header bg-dark text-white" style="border-top-left-radius: 16px; border-top-right-radius: 16px;">
                <h5 class="modal-title fw-bold" id="detailModalLabel"><i class="bi bi-file-earmark-text me-2"></i>予約内容の確認</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4" id="modal-detail-content"></div>
            <div class="modal-footer" style="border-top: 1px solid #efefef;">
                <button type="button" class="btn btn-secondary fw-bold rounded-pill px-4" data-bs-dismiss="modal">閉じる</button>
            </div>
        </div>
    </div>
</div>

<script>
    const hours = Array.from({length: 10}, (_, i) => i + 9);
    const mins = ['00', '15', '30', '45'];
    const CELL_WIDTH = 45; 

    // システム上の「今日」の基準日付
    const TODAY_STR = '2026-06-09';
    let currentStartDate = new Date(TODAY_STR);
    let allReservations = []; 

    function formatDate(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
    }

    function getDisplayDates() {
        const dates = [];
        for (let i = 0; i < 4; i++) {
            const tempDate = new Date(currentStartDate);
            tempDate.setDate(currentStartDate.getDate() + i);
            dates.push(formatDate(tempDate));
        }
        return dates;
    }

    function moveDate(days) {
        currentStartDate.setDate(currentStartDate.getDate() + days);
        renderScreen();
    }

    function resetToToday() {
        currentStartDate = new Date(TODAY_STR);
        renderScreen();
    }

    function getSlotCount(menu) {
        if (!menu) return 2;
        if (menu.includes('オイル')) return 1;
        if (menu.includes('車検見積')) return 2;
        if (menu.includes('12ヶ月') || menu.includes('点検')) return 8;
        return 2;
    }

    function timeToLeftIndex(timeStr) {
        const [h, m] = timeStr.split(':').map(Number);
        const totalMins = (h - 9) * 60 + m;
        return Math.floor(totalMins / 15);
    }

    function leftIndexToTime(index) {
        const totalMins = index * 15;
        const h = 9 + Math.floor(totalMins / 60);
        const m = totalMins % 60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
    }

    async function loadAll() {
        const res = await fetch('/api/reservations');
        allReservations = await res.json();
        renderScreen();
    }

    function renderScreen() {
        const tasksContainer = document.getElementById('pending-tasks-container');
        const rowsBox = document.getElementById('timeline-rows-box');
        const tableBody = document.getElementById('admin-table-body');
        
        tasksContainer.innerHTML = '';
        rowsBox.innerHTML = '';
        tableBody.innerHTML = ''; 

        const displayDates = getDisplayDates();

        rowsBox.innerHTML = displayDates.map(date => `
            <div class="timeline-row" data-date="${date}">
                <div class="day-label">${date.slice(5)}</div>
                <div class="slots-wrapper">
                    ${hours.map(h => mins.map(m => `<div class="slot-cell"></div>`).join('')).join('')}
                </div>
            </div>
        `).join('');

        let hasPending = false;
        
        // 💡 【パワーアップ】データを並び替え（通常の予約を上に、却下(rejected)された予約を下に落とす）
        const sortedReservations = [...allReservations].sort((a, b) => {
            if (a.status === 'rejected' && b.status !== 'rejected') return 1;
            if (a.status !== 'rejected' && b.status === 'rejected') return -1;
            return 0;
        });

        sortedReservations.forEach(r => {
            const recordId = r._id ? r._id.toString() : (r.id ? r.id.toString() : '');
            const [d, t] = r.datetime.split(' ');
            
            // 💡 【翌日自動消去ロジック】 却下済み、かつ、日付が「今日(2026-06-09)」より前の過去データなら、これ以降の処理を完全にスキップ（消去）
            if (r.status === 'rejected' && d < TODAY_STR) {
                return; 
            }

            // 1. タイムラインへの配置 (却下は表示しない)
            if (displayDates.includes(d) && r.status !== 'rejected') {
                const rowEl = document.querySelector(`.timeline-row[data-date="${d}"] .slots-wrapper`);
                if(rowEl) {
                    const isDone = r.status === 'approved';
                    const startIdx = timeToLeftIndex(t);
                    const slotsNeeded = r.slotsNeeded || getSlotCount(r.menu);
                    
                    const leftPos = startIdx * CELL_WIDTH;
                    const chipWidth = (slotsNeeded * CELL_WIDTH) - 4;

                    const chip = document.createElement('div');
                    chip.className = `reservation-chip ${isDone ? 'chip-done' : ''}`;
                    chip.style.left = `${leftPos}px`;
                    chip.style.width = `${chipWidth}px`;
                    chip.setAttribute('data-id', recordId);
                    chip.setAttribute('data-x', leftPos);
                    chip.setAttribute('data-slots', slotsNeeded);
                    chip.setAttribute('data-date', d);
                    chip.title = `${r.customerName}様 / ${r.menu}`;
                    chip.innerText = `${r.customerName}様 (${r.menu})`;
                    
                    rowEl.appendChild(chip);
                }
            }

            // 2. 未対応新規タスク
            if (r.status === 'pending') {
                hasPending = true;
                tasksContainer.innerHTML += `
                    <div class="col">
                        <div class="card task-card p-3">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="fw-bold text-dark m-0"><i class="bi bi-person-circle text-secondary me-1"></i> ${r.customerName} 様</h5>
                                <span class="badge bg-warning text-dark">未対応</span>
                            </div>
                            <div class="text-muted mb-2" style="font-size: 0.8rem;">
                                <div><i class="bi bi-car-front me-1"></i> ${r.carModel} (${r.carNumber || '番号なし'})</div>
                                <div><i class="bi bi-wrench me-1"></i> <strong class="text-primary">${r.menu}</strong></div>
                                <div><i class="bi bi-clock me-1"></i> ${r.datetime}</div>
                            </div>
                            <button class="btn btn-success btn-sm w-100 fw-bold mb-1" onclick="completeTask('${recordId}')">
                                <i class="bi bi-check2-circle me-1"></i> 対応完了 (LINEに確定通知)
                            </button>
                        </div>
                    </div>
                `;
            }

            // 3. 管理テーブルの組み立て
            let statusBadge = `<span class="badge bg-warning text-dark">未対応</span>`;
            let rowClass = "";
            if (r.status === 'approved') statusBadge = `<span class="badge bg-success">承認済</span>`;
            
            // 💡 却下済みの場合は、行全体に「row-rejected（ブラックアウト）」を適用
            if (r.status === 'rejected') {
                statusBadge = `<span class="badge bg-danger">断り済み</span>`;
                rowClass = "row-rejected";
            }

            tableBody.innerHTML += `
                <tr class="${rowClass}">
                    <td class="fw-bold">${r.customerName}</td>
                    <td>${r.carModel}</td>
                    <td>${r.carNumber || ' - '}</td>
                    <td>${r.menu}</td>
                    <td>${r.datetime}</td>
                    <td>${statusBadge}</td>
                    <td><input type="text" class="form-control form-control-sm" value="${r.rejectReason || ''}" style="width:120px;" disabled></td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-info btn-sm text-white fw-bold" onclick="showDetail('${recordId}')">
                                <i class="bi bi-file-earmark-text"></i> 確認
                            </button>
                            <button class="btn btn-danger btn-sm fw-bold" onclick="rejectTask('${recordId}')" ${r.status==='rejected'?'disabled':''}>却下</button>
                            <button class="btn btn-success btn-sm fw-bold" onclick="completeTask('${recordId}')" ${r.status==='approved'?'disabled':''}>承認</button>
                        </div>
                    </td>
                </tr>
            `;
        });

        if (!hasPending) {
            tasksContainer.innerHTML = `<div class="w-100 text-center py-4 text-muted fs-5"><i class="bi bi-emoji-smile text-success me-2"></i>現在、未対応の新規案件はありません。ばっちりです！</div>`;
        }
    }

    function showDetail(id) {
        const r = allReservations.find(res => (res._id ? res._id.toString() : res.id.toString()) === id);
        if (!r) { alert('データが見つかりませんでした。'); return; }
        const modalBody = document.getElementById('modal-detail-content');
        modalBody.innerHTML = `
            <table class="table table-bordered m-0" style="font-size: 0.9rem;">
                <tr><th class="bg-light" style="width: 35%;">お客様名</th><td class="fw-bold">${r.customerName} 様</td></tr>
                <tr><th class="bg-light">車種</th><td>${r.carModel}</td></tr>
                <tr><th class="bg-light">車両番号</th><td>${r.carNumber || '（未登録）'}</td></tr>
                <tr><th class="bg-light">作業メニュー</th><td class="text-primary fw-bold">${r.menu}</td></tr>
                <tr><th class="bg-light">予約日時</th><td class="fw-bold">${r.datetime}</td></tr>
                <tr><th class="bg-light">現在のステータス</th><td>${r.status === 'approved' ? '🟢 承認・確定済み' : (r.status === 'rejected' ? '🔴 却下・断り済み' : '🟡 未対応（要確認）')}</td></tr>
                <tr><th class="bg-light">お断り理由</th><td>${r.rejectReason || '（なし）'}</td></tr>
                <tr><th class="bg-light">LINEユーザーID</th><td><small class="text-muted" style="word-break: break-all;">${r.lineUserId || r.userId || '（Web直受付などIDなし）'}</small></td></tr>
            </table>
        `;
        const myModal = new bootstrap.Modal(document.getElementById('detailModal'));
        myModal.show();
    }

    interact('.reservation-chip').draggable({
        origin: 'self', inertia: false,
        modifiers: [ interact.modifiers.snap({ targets: [ interact.snappers.grid({ x: CELL_WIDTH, y: 0 }) ], range: Infinity, relativePoints: [ { x: 0, y: 0 } ] }) ],
        autoScroll: true,
        onstart(event) { event.target.classList.add('chip-moving'); },
        onmove(event) {
            const target = event.target;
            let x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
            if (x < 0) x = 0;
            target.style.left = `${x}px`;
            target.setAttribute('data-x', x);
        },
        onend(event) { event.target.classList.remove('chip-moving'); saveDraggedChange(event.target); }
    }).resizable({
        edges: { left: false, right: true, bottom: false, top: false },
        modifiers: [ interact.modifiers.snapSize({ targets: [ interact.snappers.grid({ x: CELL_WIDTH, y: 0 }) ], range: Infinity }) ],
        inertia: false,
        onmove(event) {
            const target = event.target;
            let width = event.rect.width;
            if (width < CELL_WIDTH) width = CELL_WIDTH;
            target.style.width = `${width - 4}px`;
            const slots = Math.round(width / CELL_WIDTH);
            target.setAttribute('data-slots', slots);
        },
        onend(event) { saveDraggedChange(event.target); }
    });

    async function saveDraggedChange(target) {
        const id = target.getAttribute('data-id');
        const x = parseFloat(target.getAttribute('data-x')) || 0;
        const slots = parseInt(target.getAttribute('data-slots')) || 1;
        const date = target.getAttribute('data-date');
        
        const newIdx = Math.round(x / CELL_WIDTH);
        const newTime = leftIndexToTime(newIdx);
        const newDatetime = `${date} ${newTime}`;

        try {
            const response = await fetch(`/api/reservations/${id}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ datetime: newDatetime, slotsNeeded: slots })
            });
            if (!response.ok) throw new Error('保存失敗');
            
            const found = allReservations.find(r => (r._id ? r._id.toString() : r.id.toString()) === id);
            if(found) {
                found.datetime = newDatetime;
                found.slotsNeeded = slots;
            }
            renderScreen();
        } catch (err) {
            console.error(err);
            alert('時間の保存に失敗しました。');
            loadAll();
        }
    }

    async function completeTask(id) {
        if(!id) return;
        const msg = `✅ 【EASE-SMB】ご予約が確定しました！\nご来店をお待ちしております。`;
        try {
            const updateRes = await fetch(`/api/reservations/${id}/approve`, { method: 'PATCH', headers: {'Content-Type': 'application/json'} });
            if(!updateRes.ok) throw new Error('サーバー更新失敗');
            await fetch(`/api/notify-line`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: id, message: msg }) });
            window.open('https://manager.line.biz/account/@912ntfos', '_blank');
            loadAll();
        } catch (error) { console.error(error); alert('処理中にエラーが発生しました。'); }
    }

    async function rejectTask(id) {
        if(!id) return;
        const reason = prompt("お断りの理由を入力してください（お客様のLINEに通知されます）", "ピット満車のため");
        if(reason === null) return;
        const msg = `❌ 【EASE-SMB】大変申し訳ございません。\n以下の理由によりご予約を承ることができませんでした。\n\n理由: ${reason}`;
        try {
            await fetch(`/api/reservations/${id}/reject`, { method: 'PATCH', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ rejectReason: reason }) });
            await fetch(`/api/notify-line`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ id: id, message: msg }) });
            loadAll();
        } catch (error) { console.error(error); alert('却下処理に失敗しました。'); }
    }

    loadAll();
</script>
</body>
</html>
