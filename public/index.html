<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EASE-SMB 入庫管理ボード</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; font-size: 0.85rem; }
        .timeline-wrapper { background: white; border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 20px; overflow-x: auto; }
        .timeline-row { display: flex; border-bottom: 1px solid #eee; height: 50px; align-items: center; }
        .day-label { width: 100px; font-weight: bold; background: #eef2f3; border-right: 2px solid #dee2e6; text-align: center; }
        .slot-cell { width: 40px; border-right: 1px solid #eee; height: 100%; position: relative; }
        .reservation-card { position: absolute; top: 2px; left: 2px; right: 2px; bottom: 2px; background: #fff3cd; border-left: 3px solid #ffc107; font-size: 0.6rem; padding: 2px; border-radius: 2px; z-index: 5; }
        .card-approved { background: #d1e7dd !important; border-left-color: #198754 !important; }
    </style>
</head>
<body>
<div class="container-fluid p-4">
    <h3 class="fw-bold mb-3">🚗 EASE-SMB 高機能入庫管理システム</h3>
    <div id="timeline-area" class="timeline-wrapper"></div>
    
    <div class="card p-4 shadow-sm">
        <h5 class="fw-bold mb-3">📋 予約詳細・承認管理</h5>
        <table class="table table-hover align-middle">
            <thead class="table-dark"><tr><th>氏名</th><th>車種</th><th>番号</th><th>メニュー</th><th>入庫日時</th><th>状態</th><th>お断り理由</th><th>アクション</th></tr></thead>
            <tbody id="reservation-list"></tbody>
        </table>
    </div>
</div>

<script>
    const hours = Array.from({length: 10}, (_, i) => i + 9);
    const mins = ['00', '15', '30', '45'];

    async function loadAll() {
        const res = await fetch('/api/reservations');
        const data = await res.json();
        const area = document.getElementById('timeline-area');
        const tbody = document.getElementById('reservation-list');
        
        // 1. 15分刻みタイムライン構築
        const dates = [...new Set(data.map(r => r.datetime.split(' ')[0]))].sort();
        area.innerHTML = dates.map(date => `
            <div class="timeline-row">
                <div class="day-label">${date.slice(5)}</div>
                ${hours.map(h => mins.map(m => `<div class="slot-cell" id="slot-${date}-${h}-${m}"></div>`).join('')).join('')}
            </div>
        `).join('');

        // 2. テーブル生成とカード配置
        tbody.innerHTML = '';
        data.forEach(r => {
            const [d, t] = r.datetime.split(' ');
            const [h, m] = t.split(':');
            const slot = document.getElementById(`slot-${d}-${parseInt(h)}-${m}`);
            if(slot) slot.innerHTML = `<div class="reservation-card ${r.status==='approved'?'card-approved':''}">${r.customerName}</div>`;

            tbody.innerHTML += `<tr>
                <td>${r.customerName}</td><td>${r.carModel}</td><td>${r.carNumber}</td><td>${r.menu}</td><td>${r.datetime}</td>
                <td>${r.status==='approved'?'承認済':'確認中'}</td>
                <td><input type="text" id="reason-${r.id}" value="${r.rejectReason || ''}" class="form-control form-control-sm"></td>
                <td>
                    <button class="btn btn-sm btn-success" onclick="process('${r.id}', 'approve')">承認</button>
                    <button class="btn btn-sm btn-danger" onclick="process('${r.id}', 'reject')">却下</button>
                </td>
            </tr>`;
        });
    }

    async function process(id, action) {
        const reason = document.getElementById(`reason-${id}`).value;
        const message = action === 'approve' ? '✅ 予約が承認されました' : `❌ 予約が却下されました\n理由: ${reason || '記載なし'}`;
        
        await fetch(`/api/reservations/${id}/${action}`, {
            method: 'PATCH',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ rejectReason: reason })
        });
        
        await fetch(`/api/notify-line`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id, message })
        });
        
        alert("処理が完了し、LINEへ通知しました。");
        loadAll();
    }
    loadAll();
</script>
</body>
</html>
