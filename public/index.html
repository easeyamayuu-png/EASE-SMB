<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>EASE-SMB 入庫管理・3連15分タイムライン</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f1f3f5; font-size: 0.8rem; }
        .reservation-card { background: #fff3cd; border-left: 2px solid #ffc107; padding: 2px; font-size: 0.6rem; cursor: pointer; }
        .card-approved { background: #d1e7dd !important; border-left-color: #198754 !important; }
        .timeline-slots-horizontal { min-height: 40px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container-fluid p-4">
        <h4 class="fw-bold mb-3">🚗 EASE-SMB 入庫管理ボード</h4>
        <div class="card p-3 mb-4" id="timeline-3days-container"></div>
        <h6 class="fw-bold">📋 予約データ一覧</h6>
        <div class="card p-3"><table class="table table-sm table-hover align-middle">
            <thead><tr><th>氏名</th><th>車種</th><th>メニュー</th><th>日時</th><th>状況</th><th>アクション</th></tr></thead>
            <tbody id="reservation-list"></tbody>
        </table></div>
    </div>

    <div class="modal fade" id="addReservationModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content"><div class="modal-body">
        <input type="text" id="new-name" class="form-control mb-2" placeholder="お客様名">
        <input type="text" id="new-car" class="form-control mb-2" placeholder="車種">
        <input type="text" id="new-menu" class="form-control mb-2" placeholder="メニュー">
        <input type="hidden" id="target-datetime">
    </div><div class="modal-footer"><button class="btn btn-primary" onclick="saveManualReservation()">予約追加</button></div></div></div></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 日付フォーマット・初期化ロジック
        function formatDate(d) { return d.toISOString().split('T')[0]; }
        async function loadReservations() {
            const res = await fetch('/api/reservations');
            const data = await res.json();
            const tbody = document.getElementById('reservation-list');
            tbody.innerHTML = '';
            data.forEach(r => {
                const statusJp = r.status === 'approved' ? '承認済' : '確認中';
                tbody.innerHTML += `<tr>
                    <td>${r.customerName}</td><td>${r.carModel}</td><td>${r.menu}</td><td>${r.datetime}</td>
                    <td><span class="badge ${r.status==='approved'?'bg-success':'bg-warning'}">${statusJp}</span></td>
                    <td>
                        ${r.status !== 'approved' ? `
                            <button class="btn btn-sm btn-outline-success" onclick="approve('${r.id}')">承認</button>
                            <input type="text" id="reason-${r.id}" placeholder="却下理由" style="width:80px">
                            <button class="btn btn-sm btn-outline-danger" onclick="reject('${r.id}')">却下</button>` : '完了'}
                    </td>
                </tr>`;
            });
        }
        
        async function approve(id) { await fetch(`/api/reservations/${id}/approve`, {method:'PATCH'}); loadReservations(); }
        async function reject(id) { 
            const reason = document.getElementById(`reason-${id}`).value;
            await fetch(`/api/reservations/${id}/reject`, {
                method:'PATCH', 
                headers:{'Content-Type':'application/json'},
                body: JSON.stringify({rejectReason: reason})
            });
            loadReservations();
        }
        
        async function saveManualReservation() {
            const data = {
                customerName: document.getElementById('new-name').value,
                carModel: document.getElementById('new-car').value,
                menu: document.getElementById('new-menu').value,
                datetime: document.getElementById('target-datetime').value,
                status: 'pending'
            };
            await fetch('/api/reservations', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data) });
            location.reload();
        }
        loadReservations();
    </script>
</body>
</html>
